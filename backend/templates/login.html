<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            background: #f7f7fa;
        }
        .login-container {
            background: #fff;
            padding: 2em 3em;
            border-radius: 12px;
            box-shadow: 0 4px 16px #0002;
            width: 320px;
        }
        h2 {
            margin-bottom: 1em;
            font-size: 1.6em;
            color: #444;
        }
        .form-group {
            margin-bottom: 1em;
        }
        label {
            display: block;
            margin-bottom: 0.5em;
            color: #666;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 0.6em;
            margin-bottom: 0.2em;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 1em;
        }
        button {
            width: 100%;
            background: #007bff;
            color: #fff;
            border: none;
            padding: 0.75em;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
        }
        .error {
            color: #a00;
            margin-bottom: 1em;
            font-size: 0.98em;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Login</h2>
        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}
        <form method="post">
            <div class="form-group">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
